name: ASH Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3

      - name: Run ASH scan
        run: ash --mode local --no-fail-on-findings

      - name: Upload SARIF to GitHub Advanced Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .ash/ash_output/reports/ash.ghas.sarif
          category: ash-security-scan

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-results
          path: .ash/ash_output/
