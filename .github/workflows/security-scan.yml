name: ASH Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        run: curl -sSf https://astral.sh/uv/install.sh | sh

      - name: Install ASH
        run: uvx git+https://github.com/awslabs/automated-security-helper.git@v3.5.4 --help

      - name: Run ASH scan
        run: |
          uvx git+https://github.com/awslabs/automated-security-helper.git@v3.5.4 \
            --config .ash/.ash.yaml \
            --output-format sarif \
            --output-dir ash-results

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ash-results/

      - name: Check for findings
        run: |
          if [ -f ash-results/results.json ]; then
            FINDINGS=$(jq '.findings | length' ash-results/results.json)
            if [ "$FINDINGS" -gt 0 ]; then
              echo "ASH found $FINDINGS security finding(s). Blocking merge."
              exit 1
            fi
          fi
          echo "No actionable security findings."